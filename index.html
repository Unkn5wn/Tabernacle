<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>HCPCS & Pager Cipher Decoder</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- Google Fonts for medical feel -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Montserrat:wght@700&display=swap" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(120deg, #eaf6fb 0%, #f8fff8 100%);
      min-height: 100vh;
      font-family: 'Inter', Arial, sans-serif;
      color: #245267;
      margin: 0;
    }
    .container {
      max-width: 920px; 
      margin: 2.7em auto 0 auto; 
      background: #fff; 
      border-radius: 17px; 
      box-shadow: 0 2px 20px 1px rgba(60,170,160,.11);
      padding: 2.15em 2.4em 2.4em 2.4em; 
      border:1.5px solid #c3eae6;
      position: relative;
      overflow: hidden;
    }
    /* Stethoscope Icon */
    .stethoscope {
      position: absolute;
      top: 18px; right: 32px;
      font-size: 2.05em;
      color: #23a18e;
      opacity: 0.8;
      filter: drop-shadow(0 2px 5px #56cbb47d);
      pointer-events: none;
      z-index: 2;
    }
    h1 {
      text-align: center; 
      color: #129c8e; 
      letter-spacing:.03em;
      font-family: 'Montserrat', 'Segoe UI', Arial, sans-serif;
      font-size: 2.25em; 
      margin-top: .09em;
      margin-bottom: 0.5em;
      font-weight: 700;
      position: relative;
    }
    h2 {
      text-align: left; font-size:1.18em; color: #137a6c; 
      margin: 2.2em 0 .7em 0;
      font-weight: 600; letter-spacing: .01em;
      border-left: 5px solid #29b0a0; padding-left: .6em;
      background: #e1f6e3;
      border-radius: 5px;
    }
    .instructions {
      color: #257f4b; background: #ecfef2; border-left:5px solid #2fc27b; 
      padding:1em 1.15em .2em 1.25em; border-radius: 10px; 
      margin-bottom:1.19em; font-size:1.03em;
      font-weight:500;
    }
    textarea {
      width:100%; max-width:100%; min-height:74px; font-size:1.08em;
      border:2px solid #b6e0e6; background:#fafefd; color:#255864;
      border-radius:10px; font-family:'Inter', Arial, sans-serif; padding:.89em 1em; 
      margin-top:.43em; transition:border .12s;
      box-shadow: 0 1px 8px #56cbb417 inset;
    }
    textarea:focus {
      border:2px solid #21a8de;
      outline: none;
      background: #f5fcfb;
    }
    button {
      background: #17b89d; color: #fff; border: none; font-size:1.07em; font-weight:600;
      border-radius: 7px; padding:.6em 2.1em; margin: 1em .5em 0 0; cursor:pointer;
      box-shadow:0 2px 13px 0 rgba(34,138,106,0.11); letter-spacing:.01em;
      transition:background .13s,box-shadow .18s;
      font-family:'Inter', Arial, sans-serif;
    }
    button:hover { background:#21dac0; box-shadow:0 3px 17px 0 rgba(16,90,67,0.09);}
    #hcpcs_output {
      margin-top: 1.3em;
      padding:1.11em 1.05em 1.2em 1.05em; background:#fafdfe; border-radius:13px;
      font-size:1.12em; color:#253f44; box-shadow:0 2px 9px 0 rgba(60,128,120,0.05);
      min-height: 2.19em; max-height:510px; overflow:auto;
    }
    table.batch-table { 
      width:100%; border-collapse:collapse; margin-bottom:1.1em; 
      background: #f7fafc; border-radius:7px;
      overflow: hidden; box-shadow: 0 1px 7px #10e4a81a;
    }
    table.batch-table th, table.batch-table td { 
      padding:.42em .19em; 
      text-align:left; 
      border-bottom:1px solid #e4eae5; 
    }
    table.batch-table th {
      background: #bdebe6;
      color: #168c7c;
      font-weight: 600;
    }
    .blankcell {background:#fafcff !important;}
    table.batch-table tr:first-child th {border-top:0;}
    table.batch-table tr:last-child td {border-bottom:0;}
    @media (max-width:920px) {
      .container{padding:1em .5em;}
    }
    @media (max-width:600px) {
      h1 {font-size: 1.23em;}
      th,td {font-size:.98em;}
    }
  </style>
  <!-- Stethoscope SVG icon -->
  <link rel="icon" href="data:image/svg+xml,%3Csvg width='51' height='51' viewBox='0 0 51 51' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cellipse cx='25.5' cy='25.5' rx='25.5' ry='25.5' fill='%2317b89d'/%3E%3Cpath d='M17 16v6M17 16a3 3 0 0 1 6 0v6m-6-6h6M27 30a6 6 0 0 0 12 0V24m-6 12V24m6 0V12a3 3 0 1 0-6 0v12' stroke='%23fff' stroke-width='2' stroke-linecap='round'/%3E%3C/svg%3E">
</head>
<body>
  <div class="container">
    <span class="stethoscope" aria-label="doctor stethoscope">
      <!-- Inline SVG stethoscope -->
      <svg width="38" height="38" viewBox="0 0 40 40" fill="none" style="vertical-align:-5px;"><ellipse cx="20" cy="20" rx="19" ry="19" fill="#21bfa4"/><path d="M13 14v4.3M13 14a2.3 2.3 0 0 1 4.6 0v4.3m-4.6-4.3h4.6M22 25.5a4.6 4.6 0 0 0 9.2 0v-5.2m-4.6 9.2v-9.2m4.6 0v-9.2a2.3 2.3 0 0 0-4.6 0v9.2" stroke="#fff" stroke-width="1.4" stroke-linecap="round"/></svg>
    </span>
    <h1>HCPCS → Pager Cipher Decoder</h1>
    <div class="instructions">
      Enter up to <b>50</b> HCPCS codes or search terms (comma, space, or line separated).<br>
      <b>Each code and description will appear once, with each Pager decoding on its own line, in a uniform, report-like format.</b><br>
      Download a professional .txt report for documentation or submission.
    </div>
    <form onsubmit="lookupHCPCS(); return false;">
      <textarea id="hcpcsbox" placeholder="e.g. J1885&#10;H1000&#10;H1003"></textarea><br>
      <button type="submit">Decode HCPCS</button>
      <button type="button" onclick="downloadHCPCSBatch()" style="background:#129c8e;">Download HCPCS Report</button>
    </form>
    <div id="hcpcs_output"></div>
  </div>
  <script>
    // Pager Reverse Mapping Table
    const pagerReverse = {
      "6": ["A","C","G"], "8": ["A","B"], "0": ["D","O","Q"], "3": ["E"], "4": ["F","H","Y"],
      "1": ["I"], "7": ["J","L","T"], "15": ["K"], "177": ["M"], "17": ["N"], "9": ["P"], "12": ["R"],
      "5": ["S"], "11": ["U","V"], "111": ["W"], "25": ["X"], "2": ["Z"]
    };
    function splitAlphaNum(str) {
      let runs = [], current = '', prevType = null;
      for (const c of str) {
        let isNum = /\d/.test(c), t = isNum ? 'num' : 'alpha';
        if (t !== prevType && current !== '') { runs.push({type: prevType, val: current}); current = ''; }
        current += c; prevType = t;
      }
      if (current) runs.push({type: prevType, val: current});
      return runs;
    }
    function groupings(s) {
      const memo = {};
      function helper(str) {
        if(str.length === 0) return [[]];
        if (memo[str]) return memo[str];
        let all = [];
        for(let len=1; len<=3 && len<=str.length; ++len) {
          let head = str.slice(0,len);
          if (pagerReverse[head]) {
            for (const rest of helper(str.slice(len))) {
              all.push([head,...rest]);
            }
          }
        }
        return memo[str] = all;
      }
      return helper(s);
    }
    function cartesian(arrays) {
      if (!arrays.length) return [];
      return arrays.reduce((a,b)=>a.flatMap(d=>b.map(e=>d.concat([e]))), [[]]);
    }
    let lastHCPCSBatch = '';
    function parseHCPCSApiResult(data, userInput) {
      if (
        Array.isArray(data) &&
        typeof data[0] === "number" && Array.isArray(data[1]) &&
        data.length >= 4 &&
        Array.isArray(data[3]) && Array.isArray(data[3][0])
      ) {
        let codeVal  = data[3][0][0] || userInput;
        let descrRaw = data[3][0][1];
        let descrVal = (descrRaw && String(descrRaw).toLowerCase() !== "null" && descrRaw !== "") ? descrRaw : "(Description not found)";
        return { code: codeVal, descr: descrVal };
      }
      if (Array.isArray(data) && Array.isArray(data[0])) {
        const fields = data[0];
        const codeIdx = fields.indexOf("code");
        let descrIdx = fields.indexOf("descr");
        if (descrIdx === -1) descrIdx = fields.indexOf("long_description");
        const codeVal = (codeIdx !== -1 && data[2][codeIdx] && data[2][codeIdx].length) ? data[2][codeIdx][0] : userInput;
        const descrRaw = (descrIdx !== -1 && data[2][descrIdx] && data[2][descrIdx].length) ? data[2][descrIdx][0] : null;
        const descrVal = (descrRaw && String(descrRaw).trim().toLowerCase() !== "null" && String(descrRaw).trim() !== "") ? descrRaw : "(Description not found)";
        return { code: codeVal, descr: descrVal };
      }
      return { code: userInput, descr: "(Description not found) (structure unknown)" };
    }
    async function fetchHCPCSDescription(userInput) {
      const url = `https://clinicaltables.nlm.nih.gov/api/hcpcs/v3/search?terms=${encodeURIComponent(userInput)}&returns=code,descr&maxList=1&exact_match=on`;
      try { const resp = await fetch(url); const data = await resp.json(); return parseHCPCSApiResult(data, userInput); }
      catch (e) { return { code: userInput, descr: "(Lookup Error: " + e + ")" }; }
    }
    function getCurrentDateTime() {
      const now = new Date(); const yyyy = now.getFullYear();
      const mm = String(now.getMonth()+1).padStart(2,'0'); const dd = String(now.getDate()).padStart(2,'0');
      const hh = String(now.getHours()).padStart(2,'0'); const min = String(now.getMinutes()).padStart(2,'0'); const ss = String(now.getSeconds()).padStart(2,'0');
      return {date: `${yyyy}-${mm}-${dd}`, time: `${hh}:${min}:${ss}`};
    }
    async function lookupHCPCS() {
      let val = document.getElementById('hcpcsbox').value;
      if (!val) { document.getElementById('hcpcs_output').innerHTML = '<i>Enter HCPCS code(s) to decode.</i>'; lastHCPCSBatch = ''; return; }
      let entries = val.replace(/[, ]+/g,'\n').split('\n').map(x=>x.trim()).filter(Boolean);
      if (entries.length > 50) entries = entries.slice(0, 50);
      let txtRows = [];
      let todayHeader = '';
      const dateNow = new Date();
      todayHeader = '----------------------------------------------------------------------\n' +
        dateNow.toLocaleDateString() + ' ' + dateNow.toLocaleTimeString() +
        '\nHCPCS PAGER DECODER - GOVERNMENT REPORT FORMAT\n' +
        'Generated by clinicaltables.nlm.nih.gov\n' +
        '----------------------------------------------------------------------\n' +
        'DATE       TIME     HCPCS CODE and DESCRIPTION\n' +
        '                      PAGER DECODINGS\n';
      let html = `<table class="batch-table"><tr>
        <th>Date</th><th>Time</th>
        <th>HCPCS (Description)</th>
        <th>Pager Decoding(s)</th></tr>`;
      for (let entry of entries) {
        const {date, time} = getCurrentDateTime();
        let descObj = await fetchHCPCSDescription(entry);
        let digits = (descObj.code || '').replace(/[^\d]/g, '');
        let combinations = [];
        if (digits) {
          let decodes = groupings(digits);
          let allCombos = [];
          for (const decode of decodes) {
            let letterSets = decode.map(p=>pagerReverse[p]||["?"]);
            let combos = cartesian(letterSets);
            allCombos.push(...combos.map(arr=>arr.join(" ")));
          }
          combinations = allCombos;
        }
        let mainLine = `${descObj.code} ${descObj.descr}`;
        if (!combinations.length) {
          html += `<tr>
            <td>${date}</td>
            <td>${time}</td>
            <td><b>${mainLine}</b></td>
            <td>(no numeric part)</td>
          </tr>`;
          txtRows.push(
            `${date}   ${time}   ${mainLine}\n      (no numeric part)\n----------------------------------------------------------------------`
          );
        } else {
          combinations.forEach((combo, idx) => {
            if (idx === 0) {
              html += `<tr>
                <td>${date}</td>
                <td>${time}</td>
                <td><b>${mainLine}</b></td>
                <td>${combo}</td>
              </tr>`;
            } else {
              html += `<tr>
                <td class="blankcell"></td>
                <td class="blankcell"></td>
                <td class="blankcell"></td>
                <td>${combo}</td>
              </tr>`;
            }
          });
          let txt = `${date}   ${time}   ${mainLine}\n`;
          combinations.forEach(c => {
            txt += `      ${c}\n`;
          });
          txt += '----------------------------------------------------------------------';
          txtRows.push(txt);
        }
      }
      html += '</table>';
      document.getElementById('hcpcs_output').innerHTML = html;
      lastHCPCSBatch = todayHeader + '\n' + txtRows.join('\n');
    }
    function downloadHCPCSBatch() {
      if (!lastHCPCSBatch) {
        alert("Please run the decoder first!");
        return;
      }
      let val = document.getElementById('hcpcsbox').value;
      let codes = val.replace(/[, ]+/g,'\n').split('\n').map(x=>x.trim()).filter(Boolean);
      let codePart = codes.length === 1 ? codes[0] : (codes[0] + "_Batch");
      const now = new Date();
      const yyyy = now.getFullYear();
      const mm = String(now.getMonth()+1).padStart(2,'0');
      const dd = String(now.getDate()).padStart(2,'0');
      const dateStr = `${yyyy}-${mm}-${dd}`;
      let filename = `${dateStr}_${codePart}_Report.txt`;
      let blob = new Blob([lastHCPCSBatch], {type: "text/plain"});
      let url = URL.createObjectURL(blob);
      let a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      setTimeout(()=>{document.body.removeChild(a); URL.revokeObjectURL(url);},150);
    }
  </script>
</body>
</html>
